  <h1>Contact Information</h1>

  <div class="home-header">
    <p>
      Feel free to reach out for collaborations, research, or project inquiries.
      Email is usually the best way to contact me.
    </p>

    <!-- Placeholder image path -->
    <img src="PATH_TO_IMAGES/placeholder-contact-hero.png" alt="Contact hero image">
  </div>

  <section class="contact-form">
    <form action="mailto:YOUR_EMAIL@domain.com" method="GET">
      <label for="email">Your Email:</label>
      <input id="email" name="email" type="email" required>

      <label for="subject">Subject:</label>
      <input id="subject" name="subject" type="text" required>

      <label for="body">Message:</label>
      <textarea id="body" name="body" required></textarea>

      <button type="submit">Send</button>
    </form>
  </section>

</body>
