  <nav>

    <a href="../contact/index.html">Contact</a>
    <a href="../about/index.html">About</a>

  <h1>Contact</h1>

  <div class="home-header">
    <p>
      Feel free to reach out regarding research collaborations, design projects,
      computational work, or anything in between. I’m always happy to connect.
    </p>

    <!-- Optional image -->
    <!-- <img src="../images/contact.png" alt="Contact illustration"> -->
  </div>

  <section class="contact-form">
    <form action="mailto:ragallar@mit.edu" method="GET">

      <label>
        Your Email
        <input name="email" type="email" required>
      </label>

      <label>
        Subject
        <input name="subject" required>
      </label>

      <label>
        Message
        <textarea name="body" rows="6" required></textarea>
      </label>

      <button type="submit">Send Message</button>

    </form>
  </section>

</body>
</html>
